name: Android Build

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.27.0
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Read app version
        id: meta
        shell: bash
        run: |
          APP_VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            RELEASE_TAG="${GITHUB_REF#refs/tags/}"
            VERSION_NAME="${RELEASE_TAG#v}"
          else
            VERSION_NAME="${APP_VERSION%%+*}"
            RELEASE_TAG="v${VERSION_NAME}"
          fi
          RELEASE_NOTES_FILE="docs/releases/v${VERSION_NAME}.md"
          echo "app_version=${APP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "version_name=${VERSION_NAME}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "release_notes_file=${RELEASE_NOTES_FILE}" >> "$GITHUB_OUTPUT"

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Prepare signing files
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [[ -z "${ANDROID_KEYSTORE_BASE64}" || -z "${ANDROID_KEYSTORE_PASSWORD}" || -z "${ANDROID_KEY_ALIAS}" || -z "${ANDROID_KEY_PASSWORD}" ]]; then
            echo "Missing Android signing secrets."
            exit 1
          fi
          mkdir -p android/app
          echo "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > android/app/upload-keystore.jks

      - name: Build release APK
        env:
          ANDROID_KEYSTORE_PATH: app/upload-keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          OVERRIDE_VERSION_NAME: ${{ steps.meta.outputs.version_name }}
        run: flutter build apk --release --split-per-abi

      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p dist
          VERSION_NAME="${{ steps.meta.outputs.version_name }}"
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk "dist/mikcb-${VERSION_NAME}-arm64-v8a.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: dist/mikcb-*.apk

      - name: Create or update GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.meta.outputs.release_tag }}
          VERSION_NAME: ${{ steps.meta.outputs.version_name }}
          RELEASE_NOTES_FILE: ${{ steps.meta.outputs.release_notes_file }}
        run: |
          RELEASE_APK="dist/mikcb-${VERSION_NAME}-arm64-v8a.apk"
          if [[ -f "${RELEASE_NOTES_FILE}" ]]; then
            RELEASE_NOTES_OPTION=(--notes-file "${RELEASE_NOTES_FILE}")
          else
            RELEASE_NOTES_OPTION=(--notes "Automated release for ${RELEASE_TAG}")
          fi
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" "${RELEASE_APK}" --clobber
            gh release edit "${RELEASE_TAG}" --title "${RELEASE_TAG}" --latest "${RELEASE_NOTES_OPTION[@]}"
          else
            gh release create "${RELEASE_TAG}" "${RELEASE_APK}" \
              --title "${RELEASE_TAG}" \
              "${RELEASE_NOTES_OPTION[@]}" \
              --target "${GITHUB_SHA}" \
              --latest
          fi
